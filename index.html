<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MyModels Distribution</title>

<style>
body{margin:0;font-family:system-ui;background:#0d1117;color:#c9d1d9}
header{background:#161b22;padding:14px 20px;border-bottom:1px solid #30363d}
.container{display:flex}
.sidebar{width:220px;background:#0d1117;border-right:1px solid #30363d;padding:20px}
.sidebar button{
  display:block;width:100%;margin-bottom:8px;
  padding:10px;background:#161b22;border:none;color:#c9d1d9;
  border-radius:6px;cursor:pointer
}
.main{flex:1;padding:30px}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px}
.download{
  display:inline-block;margin-top:12px;
  background:#238636;padding:12px 22px;
  border-radius:6px;color:white;text-decoration:none
}
.disabled{background:#555;pointer-events:none}
.hidden{display:none}
</style>
</head>

<body>

<header>
<h2>💀 MyModels Distribution</h2>
</header>

<div class="container">

<div class="sidebar">
<button onclick="show('overview')">🏠 Overview</button>
<button onclick="show('releases')">📥 Releases</button>
<button onclick="show('models')">📦 Models</button>
<button onclick="show('versions')">📜 Versions</button>
<button onclick="show('channels')">🧪 Channels</button>
</div>

<div class="main">

<!-- OVERVIEW -->
<div id="overview" class="card">
<h2>Latest Release</h2>
<p>Version: <b id="version">Loading...</b></p>

<a id="downloadBtn" class="download disabled">
📥 APK belum tersedia
</a>
</div>

<!-- RELEASES -->
<div id="releases" class="card hidden">
<h2>Download</h2>
<p id="releaseInfo">Loading...</p>
</div>

<!-- MODELS -->
<div id="models" class="card hidden">
<h2>Model Marketplace 📦</h2>

<a href="../models/llama3.gguf" download class="download">
Download Llama 3 GGUF
</a>

</div>

<!-- VERSIONS -->
<div id="versions" class="card hidden">
<h2>Changelog</h2>
<ul id="changelog"></ul>
</div>

<!-- CHANNELS -->
<div id="channels" class="card hidden">
<h2>Release Channels 🧪</h2>
<p>Stable — Recommended</p>
<p>Beta — Testing</p>
<p>Dev — Experimental</p>
</div>

</div>
</div>

<script>

// 🔀 NAVIGATION
function show(id){
  document.querySelectorAll(".main .card")
    .forEach(e=>e.classList.add("hidden"))
  document.getElementById(id)
    .classList.remove("hidden")
}

// 🔄 LOAD VERSION DATA
fetch("../releases/version.json")
.then(r=>r.json())
.then(data=>{

  document.getElementById("version").textContent=data.version

  // CHANGELOG
  const list=document.getElementById("changelog")
  data.changelog?.forEach(c=>{
    const li=document.createElement("li")
    li.textContent=c
    list.appendChild(li)
  })

  // APK DETECTION 💀
  if(data.apk){

    const btn=document.getElementById("downloadBtn")

    btn.href="../releases/"+data.apk
    btn.textContent="📥 Download APK"
    btn.classList.remove("disabled")

    document.getElementById("releaseInfo")
      .textContent="APK tersedia: "+data.apk

  }else{

    document.getElementById("releaseInfo")
      .textContent="Belum ada APK"

  }

})
.catch(()=>{
  document.getElementById("version").textContent="Error"
})

</script>

</body>
</html>
