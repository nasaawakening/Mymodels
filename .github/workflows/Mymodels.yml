name: MyModels Android Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write   # 🔥 WAJIB untuk tag & release

env:
  APP_NAME: MyModels

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      # 🔥 AUTO VERSION
      - name: Generate Version
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.$VERSION_CODE"

          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      # 🔥 UPDATE build.gradle VERSION
      - name: Update version in Gradle
        run: |
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" app/build.gradle
          sed -i "s/versionName .*/versionName \"$VERSION_NAME\"/" app/build.gradle

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > mymodels.jks

       - name: Build Signed APK
         run: ./gradlew assembleRelease
           env:
    KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
    KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
    KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 📦 BUILD AAB
      - name: Build AAB
        run: ./gradlew bundleRelease

      # 📦 UNIVERSAL COPY
      - name: Collect APKs
        run: |
          mkdir release
          cp app/build/outputs/apk/release/*.apk release/
          cp app/build/outputs/bundle/release/*.aab release/

      # 📝 AUTO CHANGELOG
      - name: Generate Changelog
        run: |
          git log -10 --pretty=format:"- %s" > CHANGELOG.txt

      # 🚀 CREATE RELEASE + TAG + UPLOAD
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: MyModels v${{ env.VERSION_NAME }}
          body_path: CHANGELOG.txt
          files: release/*