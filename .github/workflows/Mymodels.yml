name: MyModels Final Signed Release + Website

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: Mymodels

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 📥 Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 🤖 Android SDK
      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      # 🔢 AUTO VERSION
      - name: Generate Version
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.$VERSION_CODE"

          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      # 📝 Update version
      - name: Update version
        run: |
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" app/build.gradle
          sed -i "s/versionName .*/versionName \"$VERSION_NAME\"/" app/build.gradle

      # 🔐 Decode keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > mymodels.jks

      # 🏗️ Build SIGNED APK
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 📦 Find APK
      - name: Find APK
        run: |
          APK=$(find app/build -name "*universal*.apk" | head -n 1)

          if [ -z "$APK" ]; then
            APK=$(find app/build -name "*release*.apk" | head -n 1)
          fi

          echo "Found APK: $APK"
          cp "$APK" mymodels.apk

      # 🌐 COPY KE WEBSITE (folder releases)
      - name: Copy APK to releases folder
        run: |
          mkdir -p releases
          cp mymodels.apk releases/MyModels.apk

      # 📝 Update version.json untuk OTA + website
      - name: Create version.json
        run: |
          mkdir -p releases
          echo '{
            "version": "'${VERSION_NAME}'",
            "apk": "releases/MyModels.apk"
          }' > releases/version.json

      # 💾 Commit APK + version.json ke repo
      - name: Commit APK to repo
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add releases/MyModels.apk releases/version.json || true
          git commit -m "Auto update APK v${VERSION_NAME}" || true
          git push

      # 🏷️ Create Tag
      - name: Create Tag
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git tag v${VERSION_NAME}
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} v${VERSION_NAME}

      # 📝 Changelog
      - name: Generate Changelog
        run: git log -10 --pretty=format:"- %s" > CHANGELOG.txt

      # 🚀 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: MyModels v${{ env.VERSION_NAME }}
          body_path: CHANGELOG.txt
          files: mymodels.apk