name: MyModels CI

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant gradlew permission
        run: chmod +x gradlew

      # ========================
      # AUTO VERSION
      # ========================

      - name: Determine version bump
        id: version
        run: |

          git fetch --tags

          LAST_TAG=$(git tag | sort -V | tail -n1)

          if [ -z "$LAST_TAG" ]; then
            VERSION="1.0.0"
          else

            VERSION=${LAST_TAG#v}

            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3)

            COMMIT_MSG=$(git log -1 --pretty=%B)

            if [[ $COMMIT_MSG == *"#major"* ]]; then
              MAJOR=$((MAJOR+1))
              MINOR=0
              PATCH=0

            elif [[ $COMMIT_MSG == *"#minor"* ]]; then
              MINOR=$((MINOR+1))
              PATCH=0

            else
              PATCH=$((PATCH+1))
            fi

            VERSION="$MAJOR.$MINOR.$PATCH"

          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # ========================
      # BUILD ANDROID
      # ========================

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Build AAB
        run: ./gradlew bundleDebug

      # ========================
      # PREPARE FILES
      # ========================

      - name: Create release folder
        run: mkdir -p release

      - name: Copy APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk release/MyModels-${VERSION}.apk

      - name: Copy AAB
        run: |
          cp app/build/outputs/bundle/debug/app-debug.aab release/MyModels-${VERSION}.aab

      # ========================
      # CHANGELOG
      # ========================

      - name: Generate changelog
        run: |
          git log -10 --pretty=format:"- %s" > release/CHANGELOG.txt

      # ========================
      # TAG
      # ========================

      - name: Create tag
        run: |
          git tag v${VERSION}
          git push origin v${VERSION}

      # ========================
      # RELEASE
      # ========================

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: MyModels v${{ env.VERSION }}
          body_path: release/CHANGELOG.txt
          files: |
            release/MyModels-${{ env.VERSION }}.apk
            release/MyModels-${{ env.VERSION }}.aab