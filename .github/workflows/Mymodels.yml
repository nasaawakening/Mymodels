name: MyModels Final Signed Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  APP_NAME: Mymodels

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 📥 Ambil source
      - name: Checkout
        uses: actions/checkout@v4

      # ☕ Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 🤖 Android SDK
      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Grant Gradle Permission
        run: chmod +x gradlew

      # 🔢 AUTO VERSION
      - name: Generate Version
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="1.0.$VERSION_CODE"

          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      # 📝 Update version di Gradle
      - name: Update version
        run: |
          sed -i "s/versionCode .*/versionCode $VERSION_CODE/" app/build.gradle
          sed -i "s/versionName .*/versionName \"$VERSION_NAME\"/" app/build.gradle

      # 🔐 Decode keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > mymodels.jks

      # 🏗️ Build SIGNED APK
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 📦 Rename jadi mymodels.apk
      - name: Rename APK
        run: |
          APK=$(ls app/build/outputs/apk/release/*universal*.apk | head -n 1)
    cp "$APK" mymodels.apk

      # 🏷️ Tag otomatis
      - name: Create Tag
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com
          git tag v${VERSION_NAME}
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} v${VERSION_NAME}

      # 📝 Changelog
      - name: Generate Changelog
        run: git log -10 --pretty=format:"- %s" > CHANGELOG.txt

      # 🚀 Release + upload APK
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION_NAME }}
          name: MyModels v${{ env.VERSION_NAME }}
          body_path: CHANGELOG.txt
          files: mymodels.apk