name: Mymodels APK

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Grant permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Get Version Name
        id: version
        run: |
          VERSION=$(grep versionName app/build.gradle | head -1 | awk -F '"' '{print $2}')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Rename APK
        run: |
          mkdir release

          cp app/build/outputs/apk/debug/app-arm64-v8a-debug.apk release/Mymodels-${VERSION}-arm64.apk
          cp app/build/outputs/apk/debug/app-armeabi-v7a-debug.apk release/Mymodels-${VERSION}-armeabi.apk
          cp app/build/outputs/apk/debug/app-universal-debug.apk release/Mymodels-${VERSION}.apk

      - name: Create Tag
        run: |
          git tag v${VERSION}
          git push origin v${VERSION}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: release/*